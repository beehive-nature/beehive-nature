name: secret-scan

# Remote-side backstop for the local pre-commit hook: same shape rules, same
# script (scripts/secret-scan.sh), tree mode. A fresh clone that skipped the
# core.hooksPath setup still cannot land secret-shaped material on the remote.

on:
  push:
  pull_request:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Scan tracked tree for secret-shaped material
        run: sh scripts/secret-scan.sh tree
