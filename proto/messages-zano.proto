//   B. Multi-asset context fields for Confidential Assets (v2+). Native-only
//      v1 uses the single explicit-asset path. [tx-builder]
//   (OUT OF BAND) tx_prefix_hash must be byte-identical to the daemon —
//   serialization contract, vector-tested, not defined here.
//
