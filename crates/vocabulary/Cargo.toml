[package]
name = "vocabulary"
version = "0.1.0"
edition.workspace = true
license.workspace = true
description = "The project's naming-law lints, consolidated (see docs/VOCABULARY.md). v1 enforces RELAY_22's ruling: the unqualified activity-noun for node/crypto vs agricultural work is banned in favour of `node ops`/`mining` and `grow ops`/`cultivation`, because one bare word meant two things and the collision was invisible in prose and obvious in a type signature. A pure text lint with a positive control, plus a repo selftest whose allowlist is an explicit, self-validating pending-migration worklist — no silent caps."

