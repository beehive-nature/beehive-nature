[package]
name = "zano-watcher"
version = "0.1.0"
edition.workspace = true
license.workspace = true
description = "bNature Zano sense adapter: view-only wallet-RPC scanner emitting RawChainActions"

[dependencies]
normalizer = { path = "../normalizer" }
shared-types = { path = "../shared-types" }
serde_json = "1"
# Plain-HTTP JSON-RPC to a local wallet; no TLS on purpose (localhost only).
ureq = { version = "2", default-features = false }

[dev-dependencies]
escrow-core = { path = "../escrow-core" }
escrow-engine = { path = "../escrow-engine" }
time = "0.3"
